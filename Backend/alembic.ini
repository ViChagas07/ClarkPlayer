[alembic]
# Path to the Alembic configuration directory
script_location = alembic

# The sqlalchemy.url is overridden in env.py to support async engines.
# This placeholder prevents Alembic from complaining.
sqlalchemy.url = postgresql+asyncpg://postgres:Dbs171920@localhost:5432/ClarkPlayer

# Logging
file_template = %%(year)d-%%(month).2d-%%(day).2d %%(rev)s %%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
